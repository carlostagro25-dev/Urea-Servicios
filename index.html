<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NóminaControl Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0A1628;--navy2:#0F2040;--navy3:#162845;--navy4:#1E3357;
  --accent:#00D4AA;--accent-dim:#00A88A;--accent-bg:rgba(0,212,170,0.1);
  --gold:#F0B429;--gold-bg:rgba(240,180,41,0.12);
  --red:#EF4444;--red-bg:#FEF2F2;--red-border:#FECACA;
  --blue:#3B82F6;--blue-bg:#EFF6FF;
  --green:#10B981;--green-bg:#F0FDF4;
  --white:#FFFFFF;--off:#F7F9FC;--surface:#F1F5F9;
  --border:#E2E8F0;--border-soft:#EEF2F7;
  --text:#0F1C2E;--text2:#475569;--text3:#94A3B8;
  --sidebar:260px;--header:66px;
  --r:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh;display:flex;font-size:14px;line-height:1.5;}

/* ── SIDEBAR ── */
aside{width:var(--sidebar);background:var(--navy);min-height:100vh;position:fixed;left:0;top:0;bottom:0;z-index:200;display:flex;flex-direction:column;box-shadow:2px 0 20px rgba(0,0,0,0.15);}
.brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:13px;}
.brand-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-logo svg{width:21px;height:21px;}
.brand-text .b1{font-size:15px;font-weight:800;color:#fff;letter-spacing:-0.4px;}
.brand-text .b2{font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}
nav{padding:14px 12px;flex:1;overflow-y:auto;}
.nav-group{margin-bottom:20px;}
.ng-label{font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:1.5px;text-transform:uppercase;padding:0 10px;margin-bottom:6px;}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;user-select:none;}
.ni:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);}
.ni.active{background:rgba(0,212,170,0.14);color:var(--accent);}
.ni svg{width:15px;height:15px;flex-shrink:0;}
.ni-badge{margin-left:auto;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.55);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.ni.active .ni-badge{background:rgba(0,212,170,0.2);color:var(--accent);}
.sidebar-bottom{padding:14px 12px;border-top:1px solid rgba(255,255,255,0.07);}
.price-box{background:var(--navy2);border-radius:10px;padding:14px 16px;}
.pb-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:9px;}
.pb-input-row{display:flex;align-items:center;gap:6px;}
.pb-prefix{font-size:14px;color:rgba(255,255,255,0.35);font-weight:600;}
.pb-input-row input{flex:1;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:7px;padding:7px 10px;color:#fff;font-size:15px;font-family:'JetBrains Mono',monospace;font-weight:500;outline:none;transition:.15s;}
.pb-input-row input:focus{border-color:var(--accent);background:rgba(0,212,170,0.05);}
.pb-hint{font-size:10px;color:rgba(255,255,255,0.2);margin-top:6px;}

/* ── MAIN ── */
main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:var(--header);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 30px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border);}
.tb-left{display:flex;align-items:center;gap:16px;}
.tb-title{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
.tb-sub{font-size:12px;color:var(--text3);}
.tb-right{display:flex;align-items:center;gap:10px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.chip-green{background:var(--green-bg);color:#065F46;}
.chip-date{background:var(--surface);color:var(--text2);}
.dot-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.content{padding:26px 30px;flex:1;}

/* ── STATS ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px;}
.kpi{background:#fff;border-radius:var(--r-lg);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow);}
.kpi.dark{background:var(--navy);border-color:var(--navy3);}
.kpi-label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;}
.kpi.dark .kpi-label{color:rgba(255,255,255,0.35);}
.kpi-val{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-1.5px;line-height:1;}
.kpi.dark .kpi-val{color:var(--accent);}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:5px;}
.kpi.dark .kpi-sub{color:rgba(255,255,255,0.3);}
.kpi-trend{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;margin-top:4px;}
.kpi-trend.up{color:var(--green);}
.kpi-trend.neutral{color:var(--text3);}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 0;}
.card-body{padding:18px 22px;}
.card-title{font-size:14px;font-weight:700;color:var(--text);}
.card-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.card-actions{display:flex;align-items:center;gap:8px;}
.divider{height:1px;background:var(--border-soft);margin:0 22px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;line-height:1.2;}
.btn svg{width:14px;height:14px;flex-shrink:0;}
.btn-primary{background:var(--navy);color:#fff;}.btn-primary:hover{background:var(--navy2);}
.btn-accent{background:var(--accent);color:var(--navy);font-weight:700;}.btn-accent:hover{background:var(--accent-dim);}
.btn-outline{background:#fff;color:var(--text);border:1.5px solid var(--border);}.btn-outline:hover{border-color:var(--text3);}
.btn-ghost{background:transparent;color:var(--text2);border:none;}.btn-ghost:hover{background:var(--surface);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}.btn-danger:hover{background:#FEE2E2;}
.btn-gold{background:var(--gold-bg);color:#92400E;border:1px solid rgba(240,180,41,0.3);}.btn-gold:hover{background:rgba(240,180,41,0.2);}
.btn-sm{padding:5px 10px;font-size:11.5px;border-radius:6px;}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px;}
.btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11.5px;font-weight:700;color:var(--text2);letter-spacing:0.2px;}
.fg label span{color:var(--red);}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--border);border-radius:var(--r);padding:9px 12px;font-size:13.5px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:.15s;width:100%;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.12);}
.fg input::placeholder{color:var(--text3);}
.form-grid{display:grid;gap:12px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g4{grid-template-columns:1fr 1fr 1fr 1fr;}

/* ── TABLE ── */
.table-scroll{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--surface);}
th{padding:9px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--text3);letter-spacing:0.7px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border);}
td{padding:10px 14px;border-bottom:1px solid var(--border-soft);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFCFF;}
.tr{text-align:right;}
.tc{text-align:center;}
.mono{font-family:'JetBrains Mono',monospace;font-size:12.5px;}

/* ── WORKER ── */
.w-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;flex-shrink:0;}
.worker-cell{display:flex;align-items:center;gap:10px;}
.worker-info .wn{font-size:13px;font-weight:600;color:var(--text);}
.worker-info .ws{font-size:11px;color:var(--text3);}

/* ── GROUPS ── */
.group-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.gb-A{background:#DBEAFE;color:#1E40AF;}
.gb-B{background:#D1FAE5;color:#065F46;}
.gb-C{background:#FEF3C7;color:#92400E;}
.gb-D{background:#FCE7F3;color:#9D174D;}
.gb-E{background:#EDE9FE;color:#5B21B6;}
.gb-F{background:#FFEDD5;color:#9A3412;}
.gb-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* ── CHECK WORKERS ── */
.worker-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.wck{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;user-select:none;transition:.15s;}
.wck:hover{border-color:var(--accent);background:rgba(0,212,170,0.04);}
.wck.on{border-color:var(--accent);background:rgba(0,212,170,0.08);}
.wck input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.wck-name{font-size:12.5px;font-weight:600;color:var(--text);}
.wck-group{font-size:10px;color:var(--text3);}

/* ── CALC PREVIEW ── */
.calc-prev{background:var(--navy);border-radius:12px;padding:16px 20px;margin:14px 0;display:none;}
.calc-prev.show{display:block;}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.calc-item{text-align:center;}
.ci-label{font-size:9.5px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;}
.ci-val{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.ci-val.w{color:#fff;}
.calc-note{text-align:center;margin-top:10px;font-size:11px;color:rgba(255,255,255,0.3);border-top:1px solid rgba(255,255,255,0.07);padding-top:10px;}

/* ── PAYMENT SCHEDULE ── */
.pay-card{border-left:3px solid var(--gold);background:#fff;}
.pay-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.pay-pending{background:var(--gold-bg);color:#92400E;}
.pay-paid{background:var(--green-bg);color:#065F46;}
.pay-overdue{background:var(--red-bg);color:#991B1B;}
.pay-scheduled{background:var(--blue-bg);color:#1E40AF;}

/* ── WEEK NAV ── */
.wnav{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.wrange{font-size:14px;font-weight:700;color:var(--text);min-width:220px;text-align:center;}

/* ── ACTIVITY BARS ── */
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:14px;}
.day-cell{text-align:center;padding:10px 6px;border-radius:9px;cursor:pointer;transition:.15s;border:1.5px solid var(--border-soft);}
.day-cell:hover{border-color:var(--accent);}
.day-cell.has{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3);}
.day-cell.today{background:var(--navy);border-color:var(--navy);}
.dc-day{font-size:9.5px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px;}
.day-cell .dc-day{color:var(--text3);}
.day-cell.has .dc-day{color:var(--accent-dim);}
.day-cell.today .dc-day{color:rgba(255,255,255,0.45);}
.dc-val{font-size:15px;font-weight:800;color:var(--text3);}
.day-cell.has .dc-val{color:var(--text);}
.day-cell.today .dc-val{color:var(--accent);}
.dc-date{font-size:9px;color:var(--text3);margin-top:2px;}
.day-cell.today .dc-date{color:rgba(255,255,255,0.3);}

/* ── GROUP FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;transition:.15s;font-family:inherit;}
.filter-btn:hover{border-color:var(--text3);}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* ── STATUS ── */
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}
.sd-green{background:var(--green);}
.sd-gray{background:var(--text3);}
.sd-gold{background:var(--gold);}
.sd-red{background:var(--red);}

/* ── EMPTY STATE ── */
.empty{padding:48px 20px;text-align:center;}
.empty-ico{font-size:38px;opacity:.35;margin-bottom:12px;}
.empty-txt{font-size:13px;color:var(--text3);}
.empty-btn{margin-top:14px;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,22,40,0.6);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.overlay.show{display:flex;}
.modal{background:#fff;border-radius:var(--r-xl);padding:28px;width:500px;max-width:95vw;box-shadow:0 24px 64px rgba(0,0,0,0.25);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:20px;letter-spacing:-0.3px;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--border);}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,0.3);z-index:999;display:flex;align-items:center;gap:9px;transform:translateY(90px);opacity:0;transition:.3s cubic-bezier(.34,1.56,.64,1);}
.toast.show{transform:none;opacity:1;}
.toast-ico{width:20px;height:20px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── SECTION DIVIDER ── */
.sec-div{display:flex;align-items:center;gap:12px;margin:20px 0 16px;}
.sec-div-line{flex:1;height:1px;background:var(--border);}
.sec-div-label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap;}

/* ── PAYMENT TABLE ── */
.pay-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border-soft);}
.pay-row:last-child{border-bottom:none;}
.pr-left{display:flex;align-items:center;gap:12px;}
.pr-right{display:flex;align-items:center;gap:12px;}

/* ── AVATAR PALETTE ── */
.av-1{background:#DBEAFE;color:#1D4ED8;}
.av-2{background:#D1FAE5;color:#065F46;}
.av-3{background:#FEF3C7;color:#92400E;}
.av-4{background:#FCE7F3;color:#9D174D;}
.av-5{background:#EDE9FE;color:#5B21B6;}
.av-6{background:#FFEDD5;color:#9A3412;}
.av-7{background:#FEE2E2;color:#991B1B;}
.av-8{background:#E0F2FE;color:#0369A1;}

/* ── ALERTS ── */
.alert{padding:12px 16px;border-radius:9px;font-size:12.5px;display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
.alert-gold{background:var(--gold-bg);border:1px solid rgba(240,180,41,0.3);color:#78350F;}
.alert svg{flex-shrink:0;margin-top:1px;}

/* ── PROGRESS BAR ── */
.pbar-wrap{background:var(--surface);border-radius:4px;height:5px;overflow:hidden;margin-top:6px;}
.pbar-fill{height:100%;border-radius:4px;background:var(--accent);transition:.4s;}

/* ── responsive ── */
@media(max-width:900px){
  :root{--sidebar:0px;}
  aside{display:none;}
  .content{padding:18px 16px;}
  .topbar{padding:0 16px;}
  .g2,.g3,.g4{grid-template-columns:1fr;}
  .worker-grid{grid-template-columns:1fr;}
  .calc-grid{grid-template-columns:1fr 1fr;}
  .day-grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside>
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="white"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14c1.1 0 2-.9 2-2V5a2 2 0 00-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
    </div>
    <div class="brand-text">
      <div class="b1">NóminaControl</div>
      <div class="b2">Sistema Pro v2.0</div>
    </div>
  </div>

  <nav>
    <div class="nav-group">
      <div class="ng-label">Principal</div>
      <div class="ni active" onclick="goTab('dashboard')" id="nav-dashboard">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        Panel Principal
      </div>
    </div>
    <div class="nav-group">
      <div class="ng-label">Gestión</div>
      <div class="ni" onclick="goTab('workers')" id="nav-workers">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        Trabajadores
        <span class="ni-badge" id="badge-workers">0</span>
      </div>
      <div class="ni" onclick="goTab('groups')" id="nav-groups">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
        Grupos de Trabajo
        <span class="ni-badge" id="badge-groups">0</span>
      </div>
    </div>
    <div class="nav-group">
      <div class="ng-label">Producción</div>
      <div class="ni" onclick="goTab('daily')" id="nav-daily">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
        Registro Diario
      </div>
      <div class="ni" onclick="goTab('weekly')" id="nav-weekly">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
        Resumen Semanal
      </div>
    </div>
    <div class="nav-group">
      <div class="ng-label">Pagos</div>
      <div class="ni" onclick="goTab('payments')" id="nav-payments">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
        Programar Pagos
        <span class="ni-badge" id="badge-payments">0</span>
      </div>
    </div>
  </nav>

  <div class="sidebar-bottom">
    <div class="price-box">
      <div class="pb-label">Precio base por saco</div>
      <div class="pb-input-row">
        <span class="pb-prefix">$</span>
        <input type="number" id="precio-saco" value="100" min="0" step="0.01" onchange="S.precio=parseFloat(this.value)||100;save();">
      </div>
      <div class="pb-hint">Aplica a todos los registros nuevos</div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main>
  <div class="topbar">
    <div class="tb-left">
      <div>
        <div class="tb-title" id="page-title">Panel Principal</div>
        <div class="tb-sub" id="page-sub">Vista general del sistema</div>
      </div>
    </div>
    <div class="tb-right">
      <span class="chip chip-date" id="fecha-display"></span>
      <span class="chip chip-green"><span class="dot-pulse"></span>Sistema activo</span>
    </div>
  </div>
  <div class="content" id="content"></div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-ico">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="#0A1628"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  </div>
  <span id="toast-txt"></span>
</div>

<script>
// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
const DB = 'nc_pro_v3';
let S = {
  trabajadores: [],
  grupos: [],        // {id, nombre, color, descripcion}
  registros: [],     // {id, fecha, totalSacos, precio, trabajadoresIds, grupoId?}
  pagos: [],         // {id, fechaPago, concepto, trabajadoresIds, montoCustom?, grupoId?, estado, semana, notas}
  precio: 100,
  tab: 'dashboard',
  semOff: 0,
  wFilter: 'all'
};
const GROUP_COLORS = ['A','B','C','D','E','F'];

// ════════════════════════════════════════════════════════
//  PERSISTENCE
// ════════════════════════════════════════════════════════
function save(){
  try{ localStorage.setItem(DB, JSON.stringify({t:S.trabajadores,g:S.grupos,r:S.registros,p:S.pagos,pr:S.precio})); }catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(DB)||'null');
    if(!d) return;
    if(d.t) S.trabajadores=d.t;
    if(d.g) S.grupos=d.g;
    if(d.r) S.registros=d.r;
    if(d.p) S.pagos=d.p;
    if(d.pr) S.precio=d.pr;
  }catch(e){}
}

// ════════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════════
const uid = () => Math.random().toString(36).slice(2,9);
const ini = n => (n||'?').split(' ').filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'?';
const avCol = n => 'av-'+(((n||'').charCodeAt(0)||0)%8+1);
const fmtM = n => '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtF = iso => { if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; };
const hoy = () => new Date().toISOString().slice(0,10);
const dayName = iso => { const n=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']; return n[new Date(iso+'T12:00').getDay()]; };
const dayFull = iso => { const n=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado']; return n[new Date(iso+'T12:00').getDay()]; };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(msg, dur=2800){
  const t=document.getElementById('toast');
  document.getElementById('toast-txt').textContent=msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),dur);
}
function semana(off){
  const h=new Date(); const dow=h.getDay(); const diff=(dow===0?-6:1-dow)+off*7;
  const lun=new Date(h); lun.setDate(h.getDate()+diff);
  return Array.from({length:7},(_,i)=>{ const d=new Date(lun); d.setDate(lun.getDate()+i); return d.toISOString().slice(0,10); });
}
function gbClass(nombre){ const i=S.grupos.findIndex(g=>g.nombre===nombre); return 'gb-'+(GROUP_COLORS[i%GROUP_COLORS.length]||'A'); }
function gbClassByID(id){ const g=S.grupos.find(x=>x.id===id); if(!g) return ''; return gbClass(g.nombre); }
function getWorkerGroup(wid){ return S.grupos.find(g=>g.trabajadoresIds&&g.trabajadoresIds.includes(wid)); }
function payStatus(p){
  if(p.estado==='pagado') return {cls:'pay-paid',label:'Pagado'};
  const fp=new Date(p.fechaPago+'T12:00'); const h=new Date();
  if(fp<h && p.estado!=='pagado') return {cls:'pay-overdue',label:'Vencido'};
  const diff=Math.ceil((fp-h)/(1000*60*60*24));
  if(diff<=3) return {cls:'pay-pending',label:'Próximo'};
  return {cls:'pay-scheduled',label:'Programado'};
}

// ════════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════════
const TAB_META = {
  dashboard:  {title:'Panel Principal',    sub:'Vista general del sistema'},
  workers:    {title:'Trabajadores',       sub:'Gestión de personal y datos bancarios'},
  groups:     {title:'Grupos de Trabajo',  sub:'Organización por equipos de producción'},
  daily:      {title:'Registro Diario',    sub:'Captura de sacos terminados por turno'},
  weekly:     {title:'Resumen Semanal',    sub:'Informe detallado y exportación a Excel'},
  payments:   {title:'Programar Pagos',    sub:'Calendario y control de dispersiones'},
};
function goTab(t){
  S.tab=t;
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+t); if(nav) nav.classList.add('active');
  const m=TAB_META[t];
  document.getElementById('page-title').textContent=m.title;
  document.getElementById('page-sub').textContent=m.sub;
  updateBadges();
  render();
}
function updateBadges(){
  document.getElementById('badge-workers').textContent=S.trabajadores.length;
  document.getElementById('badge-groups').textContent=S.grupos.length;
  const pendientes=S.pagos.filter(p=>p.estado!=='pagado').length;
  const pb=document.getElementById('badge-payments');
  pb.textContent=pendientes;
  pb.style.background=pendientes>0?'rgba(240,180,41,0.25)':'rgba(255,255,255,0.1)';
  pb.style.color=pendientes>0?'var(--gold)':'rgba(255,255,255,0.55)';
}

// ════════════════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════════════════
function openModal(title,body,footer){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=footer;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }

// ════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════
function render(){
  document.getElementById('fecha-display').textContent=new Date().toLocaleDateString('es-MX',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  const c=document.getElementById('content');
  if(S.tab==='dashboard')  c.innerHTML=buildDashboard();
  else if(S.tab==='workers')  c.innerHTML=buildWorkers();
  else if(S.tab==='groups')   c.innerHTML=buildGroups();
  else if(S.tab==='daily')    c.innerHTML=buildDaily();
  else if(S.tab==='weekly')   c.innerHTML=buildWeekly();
  else if(S.tab==='payments') c.innerHTML=buildPayments();
}

// ════════════════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════════════════
function buildDashboard(){
  const h=hoy(); const dias=semana(0); const regsH=S.registros.find(r=>r.fecha===h);
  const regsSem=S.registros.filter(r=>dias.includes(r.fecha));
  const sacosHoy=regsH?regsH.totalSacos:0; const trabHoy=regsH?regsH.trabajadoresIds.length:0;
  const sacosSem=regsSem.reduce((a,r)=>a+r.totalSacos,0);
  const pagSem=regsSem.reduce((a,r)=>{ const n=r.trabajadoresIds.length; return a+(Math.floor(r.totalSacos/n)*r.precio*n); },0);
  const pendPagos=S.pagos.filter(p=>p.estado!=='pagado');
  const ultRegs=S.registros.slice(0,6);
  const ND=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  return `
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">Total trabajadores</div><div class="kpi-val">${S.trabajadores.length}</div><div class="kpi-sub">${S.grupos.length} grupo${S.grupos.length!==1?'s':''} activo${S.grupos.length!==1?'s':''}</div></div>
    <div class="kpi"><div class="kpi-label">Sacos hoy</div><div class="kpi-val">${sacosHoy}</div><div class="kpi-sub">${trabHoy} trabajador${trabHoy!==1?'es':''} presentes</div></div>
    <div class="kpi"><div class="kpi-label">Sacos esta semana</div><div class="kpi-val">${sacosSem}</div><div class="kpi-sub">${regsSem.length} día${regsSem.length!==1?'s':''} capturados</div></div>
    <div class="kpi dark"><div class="kpi-label">Nómina semanal</div><div class="kpi-val">${fmtM(pagSem)}</div><div class="kpi-sub">A $${S.precio.toFixed(2)}/saco</div></div>
    <div class="kpi" style="border-left:3px solid var(--gold);"><div class="kpi-label">Pagos pendientes</div><div class="kpi-val" style="color:${pendPagos.length>0?'var(--gold)':'var(--text)'};">${pendPagos.length}</div><div class="kpi-sub">Dispersiones por realizar</div></div>
  </div>

  ${pendPagos.length>0?`<div class="alert alert-gold" style="margin-bottom:18px;">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="#92400E"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
    Tienes <strong>${pendPagos.length} pago${pendPagos.length!==1?'s':''} pendiente${pendPagos.length!==1?'s':''}</strong>. ${pendPagos.filter(p=>payStatus(p).cls==='pay-overdue').length>0?`<strong>${pendPagos.filter(p=>payStatus(p).cls==='pay-overdue').length} vencido${pendPagos.filter(p=>payStatus(p).cls==='pay-overdue').length!==1?'s':''}</strong>.`:''} <span style="cursor:pointer;text-decoration:underline;" onclick="goTab('payments')">Ver pagos →</span>
  </div>`:''}

  <div style="display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px;">
    <div class="card">
      <div class="card-head"><div><div class="card-title">Actividad semanal</div><div class="card-sub">Sacos por día</div></div><button class="btn btn-outline btn-sm" onclick="goTab('daily')">+ Registrar</button></div>
      <div class="card-body" style="padding-top:14px;">
        <div class="day-grid">
          ${dias.map((d,i)=>{ const reg=S.registros.find(r=>r.fecha===d); const es=d===h; return `<div class="day-cell ${reg?'has':''} ${es?'today':''}" onclick="goTab('daily')">
            <div class="dc-day">${ND[i]}</div>
            <div class="dc-val">${reg?reg.totalSacos:'—'}</div>
            <div class="dc-date">${fmtF(d).slice(0,5)}</div>
          </div>`; }).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">Grupos</div></div>
      <div class="card-body" style="padding-top:12px;">
        ${!S.grupos.length?`<div class="empty" style="padding:24px 0;"><div class="empty-ico">👥</div><div class="empty-txt">Sin grupos</div><div class="empty-btn"><button class="btn btn-outline btn-sm" onclick="goTab('groups')">Crear grupo</button></div></div>`:
        S.grupos.map(g=>{
          const members=(g.trabajadoresIds||[]).length;
          const sacosG=S.registros.filter(r=>dias.includes(r.fecha)&&r.grupoId===g.id).reduce((a,r)=>a+r.totalSacos,0);
          return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft);">
            <span class="group-badge ${gbClass(g.nombre)}">${g.nombre}</span>
            <div style="flex:1;"><div style="font-size:12px;font-weight:600;">${esc(g.nombre)}</div><div style="font-size:11px;color:var(--text3);">${members} miembro${members!==1?'s':''}</div></div>
            <div style="text-align:right;"><div style="font-size:12px;font-weight:700;color:var(--accent-dim);">${sacosG}</div><div style="font-size:10px;color:var(--text3);">sacos/sem</div></div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-title">Últimos registros</div><button class="btn btn-outline btn-sm" onclick="goTab('weekly')">Ver semana →</button></div>
    <div class="card-body">
    ${!ultRegs.length?`<div class="empty"><div class="empty-ico">📋</div><div class="empty-txt">Aún no hay registros. Comienza capturando producción.</div><div class="empty-btn"><button class="btn btn-primary btn-sm" onclick="goTab('daily')">Registrar primer día</button></div></div>`:`
    <div class="table-scroll">
      <table>
        <thead><tr><th>Fecha</th><th>Grupo</th><th class="tr">Sacos</th><th class="tr">Personal</th><th class="tr">Sacos c/u</th><th class="tr">Sueldo c/u</th><th class="tr">Total</th></tr></thead>
        <tbody>${ultRegs.map(r=>{
          const n=r.trabajadoresIds.length; const sxp=Math.floor(r.totalSacos/n);
          const g=S.grupos.find(x=>x.id===r.grupoId);
          return `<tr>
            <td><strong>${dayName(r.fecha)}</strong> <span class="mono" style="font-size:11.5px;color:var(--text3);">${fmtF(r.fecha)}</span></td>
            <td>${g?`<span class="group-badge ${gbClass(g.nombre)}">${g.nombre}</span>`:'<span style="color:var(--text3);font-size:12px;">—</span>'}</td>
            <td class="tr mono">${r.totalSacos}</td>
            <td class="tr">${n}</td>
            <td class="tr mono">${sxp}</td>
            <td class="tr mono">${fmtM(sxp*r.precio)}</td>
            <td class="tr mono" style="font-weight:700;color:var(--green);">${fmtM(sxp*r.precio*n)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
//  WORKERS
// ════════════════════════════════════════════════════════
function buildWorkers(){
  const gFilter=S.wFilter||'all';
  let list=S.trabajadores;
  if(gFilter!=='all'){ const g=S.grupos.find(x=>x.id===gFilter); list=g?S.trabajadores.filter(t=>(g.trabajadoresIds||[]).includes(t.id)):list; }

  return `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;">
    <div class="card">
      <div class="card-head"><div class="card-title">Nuevo trabajador</div></div>
      <div class="card-body">
        <div class="form-grid g2">
          <div class="fg"><label>Nombre completo <span>*</span></label><input id="wn" type="text" placeholder="Ej. Juan García López"></div>
          <div class="fg"><label>Grupo de trabajo</label><select id="wg"><option value="">Sin grupo</option>${S.grupos.map(g=>`<option value="${g.id}">${g.nombre}</option>`).join('')}</select></div>
          <div class="fg"><label>N° de cuenta bancaria</label><input id="wc" type="text" placeholder="16 dígitos CLABE/cuenta"></div>
          <div class="fg"><label>Banco</label><input id="wb" type="text" placeholder="BBVA, Banamex, HSBC..."></div>
          <div class="fg"><label>Nombre del cuentahabiente</label><input id="wt" type="text" placeholder="Titular de la cuenta"></div>
          <div class="fg"><label>Teléfono</label><input id="wtel" type="text" placeholder="Ej. 55 1234 5678"></div>
        </div>
        <button class="btn btn-primary" onclick="addWorker()" style="margin-top:4px;">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Agregar trabajador
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div><div class="card-title">Estadísticas del personal</div></div></div>
      <div class="card-body">
        ${S.grupos.map(g=>{ const cnt=(g.trabajadoresIds||[]).length; const pct=S.trabajadores.length?Math.round(cnt/S.trabajadores.length*100):0;
          return `<div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <span style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;"><span class="group-badge ${gbClass(g.nombre)}" style="padding:2px 8px;font-size:10px;">${g.nombre}</span>${esc(g.nombre)}</span>
              <span style="font-size:13px;font-weight:700;color:var(--text2);">${cnt} <span style="color:var(--text3);font-weight:400;">/ ${S.trabajadores.length}</span></span>
            </div>
            <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%;background:${['#3B82F6','#10B981','#F59E0B','#EC4899','#8B5CF6','#F97316'][S.grupos.indexOf(g)%6]};"></div></div>
          </div>`;
        }).join('')}
        ${!S.grupos.length?'<div style="font-size:13px;color:var(--text3);padding:10px 0;">Crea grupos para ver estadísticas.</div>':''}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;">
          <span style="font-size:12px;color:var(--text3);">Sin grupo asignado</span>
          <span style="font-size:13px;font-weight:700;">${S.trabajadores.filter(t=>!getWorkerGroup(t.id)).length}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <div><div class="card-title">Plantilla laboral</div><div class="card-sub">${S.trabajadores.length} trabajador${S.trabajadores.length!==1?'es':''}</div></div>
    </div>
    <div class="card-body" style="padding-top:10px;">
      <div class="filter-bar">
        <button class="filter-btn ${gFilter==='all'?'active':''}" onclick="S.wFilter='all';render();">Todos (${S.trabajadores.length})</button>
        ${S.grupos.map(g=>`<button class="filter-btn ${gFilter===g.id?'active':''}" onclick="S.wFilter='${g.id}';render();">${g.nombre} (${(g.trabajadoresIds||[]).length})</button>`).join('')}
        <button class="filter-btn ${gFilter==='none'?'active':''}" onclick="S.wFilter='none';render();">Sin grupo (${S.trabajadores.filter(t=>!getWorkerGroup(t.id)).length})</button>
      </div>
      ${!list.length?`<div class="empty"><div class="empty-ico">🔍</div><div class="empty-txt">No hay trabajadores en este filtro.</div></div>`:`
      <div class="table-scroll">
        <table>
          <thead><tr><th>Trabajador</th><th>Grupo</th><th>Banco</th><th>N° Cuenta</th><th>Cuentahabiente</th><th>Teléfono</th><th class="tc">Estado</th><th class="tc">Acciones</th></tr></thead>
          <tbody>
            ${list.map(t=>{ const g=getWorkerGroup(t.id);
              return `<tr>
                <td><div class="worker-cell"><div class="w-avatar ${avCol(t.nombre)}">${ini(t.nombre)}</div><div class="worker-info"><div class="wn">${esc(t.nombre)}</div></div></div></td>
                <td>${g?`<span class="group-badge ${gbClass(g.nombre)}">${g.nombre}</span>`:'<span style="color:var(--text3);font-size:12px;">—</span>'}</td>
                <td style="font-size:12.5px;">${esc(t.banco)||'—'}</td>
                <td class="mono">${esc(t.cuenta)||'—'}</td>
                <td style="font-size:12.5px;">${esc(t.titular)||'—'}</td>
                <td style="font-size:12.5px;">${esc(t.tel)||'—'}</td>
                <td class="tc"><span class="status-dot sd-green"></span><span style="font-size:11.5px;color:var(--green);">Activo</span></td>
                <td class="tc" style="display:flex;gap:5px;justify-content:center;">
                  <button class="btn btn-outline btn-xs" onclick="editWorker('${t.id}')">Editar</button>
                  <button class="btn btn-danger btn-xs" onclick="delWorker('${t.id}')">Eliminar</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}
    </div>
  </div>`;
}

function addWorker(){

let D={fecha:hoy(),sacos:'',sel:[],gid:''};

function buildDaily(){
  const n=D.sel.length; const sacos=parseInt(D.sacos)||0;
  const sxp=n>0&&sacos>0?Math.floor(sacos/n):0;
  const recientes=S.registros.slice(0,10);
  return `
  <div style="display:grid;grid-template-columns:3fr 2fr;gap:18px;">
    <div>
      <div class="card">
        <div class="card-head"><div class="card-title">Captura de producción</div></div>

            <div class="fg"><label>Total sacos terminados <span>*</span></label><input type="number" id="d-sacos" value="${D.sacos}" min="0" placeholder="Ej. 200" oninput="D.sacos=this.value;updCalc()"></div>
            <div class="fg"><label>Grupo de trabajo</label><select id="d-grupo" onchange="D.gid=this.value;filterWorkersGroup()"><option value="">Todos los trabajadores</option>${S.grupos.map(g=>`<option value="${g.id}" ${D.gid===g.id?'selected':''}>${g.nombre}</option>`).join('')}</select></div>

          ${!S.trabajadores.length?`<div style="padding:14px;background:var(--surface);border-radius:9px;font-size:13px;color:var(--text3);">Registra trabajadores primero.</div>`:`
          <div style="display:flex;gap:8px;margin-bottom:10px;">
            <button class="btn btn-ghost btn-xs" onclick="selAll()">Seleccionar todos</button>
            <button class="btn btn-ghost btn-xs" onclick="selNone()">Ninguno</button>
            ${S.grupos.map(g=>`<button class="btn btn-ghost btn-xs" onclick="selGroup('${g.id}')">Solo ${g.nombre}</button>`).join('')}
          </div>
          <div class="worker-grid" id="wck-list">
            ${buildWorkerChecks()}
          </div>`}

          <div class="calc-prev ${n>0&&sacos>0?'show':''}" id="calc-prev">
            <div class="calc-grid">
              <div class="calc-item"><div class="ci-label">Trabajadores</div><div class="ci-val w">${n}</div></div>
              <div class="calc-item"><div class="ci-label">Sacos c/u</div><div class="ci-val">${sxp}</div></div>
              <div class="calc-item"><div class="ci-label">Sueldo c/u</div><div class="ci-val">${fmtM(sxp*S.precio)}</div></div>
              <div class="calc-item"><div class="ci-label">Total a pagar</div><div class="ci-val w">${fmtM(sxp*S.precio*n)}</div></div>
            </div>
            <div class="calc-note">Precio: ${fmtM(S.precio)}/saco · ${Math.floor(sacos/Math.max(n,1))} sacos × ${n} trabajador${n!==1?'es':''} = ${Math.floor(sacos/Math.max(n,1))*n} sacos distribuidos ${sacos-Math.floor(sacos/Math.max(n,1))*n>0?`(${sacos-Math.floor(sacos/Math.max(n,1))*n} restante${sacos-Math.floor(sacos/Math.max(n,1))*n!==1?'s':''} sin asignar)`:''}</div>
          </div>

          <button class="btn btn-accent" onclick="saveDaily()" style="margin-top:4px;">
            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
            Guardar registro
          </button>
        </div>

    <div>
      <div class="card">
        <div class="card-head"><div class="card-title">Historial reciente</div></div>
        <div class="card-body" style="padding-top:10px;">
          ${!recientes.length?`<div class="empty" style="padding:24px 0;"><div class="empty-ico">📋</div><div class="empty-txt">Sin registros aún</div></div>`:
          recientes.map(r=>{
            const n2=r.trabajadoresIds.length; const sxp2=Math.floor(r.totalSacos/n2);

              </div>

                  <div style="font-size:13px;font-weight:700;color:var(--text);">${r.totalSacos} sacos</div>
                  <div style="font-size:11px;color:var(--green);font-weight:600;">${fmtM(sxp2*r.precio*n2)}</div>

function buildWorkerChecks(){
  let list=S.trabajadores;
  if(D.gid){ const g=S.grupos.find(x=>x.id===D.gid); if(g) list=S.trabajadores.filter(t=>(g.trabajadoresIds||[]).includes(t.id)); }
  return list.map(t=>{
    const g=getWorkerGroup(t.id);
    return `<label class="wck ${D.sel.includes(t.id)?'on':''}" onclick="toggleSel('${t.id}')">
      <input type="checkbox" ${D.sel.includes(t.id)?'checked':''} onclick="event.preventDefault()">
      <div class="w-avatar ${avCol(t.nombre)}" style="width:26px;height:26px;font-size:10px;">${ini(t.nombre)}</div>
      <div><div class="wck-name">${esc(t.nombre)}</div>${g?`<div class="wck-group">${g.nombre}</div>`:''}</div>
    </label>`;
  }).join('');
}

function filterWorkersGroup(){ D.gid=document.getElementById('d-grupo')?.value||''; const wl=document.getElementById('wck-list'); if(wl) wl.innerHTML=buildWorkerChecks(); }
function selAll(){ S.trabajadores.forEach(t=>{ if(!D.sel.includes(t.id)) D.sel.push(t.id); }); const wl=document.getElementById('wck-list'); if(wl) wl.innerHTML=buildWorkerChecks(); updCalc(); }
function selNone(){ D.sel=[]; const wl=document.getElementById('wck-list'); if(wl) wl.innerHTML=buildWorkerChecks(); updCalc(); }
function selGroup(gid){ const g=S.grupos.find(x=>x.id===gid); if(!g) return; D.sel=(g.trabajadoresIds||[]).slice(); const wl=document.getElementById('wck-list'); if(wl) wl.innerHTML=buildWorkerChecks(); updCalc(); }

function toggleSel(id){
  const i=D.sel.indexOf(id); if(i>=0) D.sel.splice(i,1); else D.sel.push(id);
  const el=document.querySelector(`.wck[onclick="toggleSel('${id}')"]`);
  if(el){ el.classList.toggle('on',D.sel.includes(id)); el.querySelector('input').checked=D.sel.includes(id); }
  updCalc();
}
function updCalc(){
  const n=D.sel.length; const sacos=parseInt(D.sacos)||0; const sxp=n>0&&sacos>0?Math.floor(sacos/n):0;
  const cp=document.getElementById('calc-prev'); if(!cp) return;
  if(n>0&&sacos>0){
    cp.classList.add('show');
    cp.innerHTML=`<div class="calc-grid">
      <div class="calc-item"><div class="ci-label">Trabajadores</div><div class="ci-val w">${n}</div></div>
      <div class="calc-item"><div class="ci-label">Sacos c/u</div><div class="ci-val">${sxp}</div></div>
      <div class="calc-item"><div class="ci-label">Sueldo c/u</div><div class="ci-val">${fmtM(sxp*S.precio)}</div></div>
      <div class="calc-item"><div class="ci-label">Total a pagar</div><div class="ci-val w">${fmtM(sxp*S.precio*n)}</div></div>
    </div>
    <div class="calc-note">Precio: ${fmtM(S.precio)}/saco · Distribuidos: ${sxp*n}/${sacos} sacos${sacos-sxp*n>0?` (${sacos-sxp*n} resto)`:''}</div>`;
  } else cp.classList.remove('show');
}
function saveDaily(){
  const fecha=document.getElementById('d-fecha')?.value||D.fecha;
  D.fecha=fecha;
  const sacos=parseInt(document.getElementById('d-sacos')?.value||D.sacos);
  if(isNaN(sacos)||sacos<=0){toast('Ingresa la cantidad de sacos');return;}
  if(D.sel.length===0){toast('Selecciona al menos un trabajador');return;}
  const ex=S.registros.findIndex(r=>r.fecha===fecha);
  if(ex>=0){if(!confirm('Ya hay un registro para esta fecha. ¿Sobreescribir?'))return; S.registros.splice(ex,1);}
  S.registros.push({id:uid(),fecha,totalSacos:sacos,precio:S.precio,trabajadoresIds:[...D.sel],grupoId:D.gid||undefined});
  S.registros.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  D.sacos=''; D.sel=[];
  save(); toast('Registro guardado exitosamente'); render();
}
function delReg(id){ if(!confirm('¿Eliminar?')) return; S.registros=S.registros.filter(r=>r.id!==id); save(); toast('Registro eliminado'); render(); }

// ════════════════════════════════════════════════════════
function buildWeekly(){
  const dias=semana(S.semOff);
  const regs=S.registros.filter(r=>dias.includes(r.fecha));
  const ND=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const gFilter=S.wgFilter||'all';

  let trabajadoresBase=S.trabajadores;
  if(gFilter!=='all'){ const g=S.grupos.find(x=>x.id===gFilter); trabajadoresBase=g?S.trabajadores.filter(t=>(g.trabajadoresIds||[]).includes(t.id)):trabajadoresBase; }

  const res=trabajadoresBase.map(t=>{
    const sd=dias.map(dia=>{ const r=regs.find(rr=>rr.fecha===dia&&rr.trabajadoresIds.includes(t.id)); return r?Math.floor(r.totalSacos/r.trabajadoresIds.length):null; });
    const ts=sd.reduce((a,b)=>a+(b||0),0); return {t,sd,ts,sueldo:ts*S.precio};
  }).filter(w=>w.ts>0);
  const totS=res.reduce((a,w)=>a+w.ts,0), totP=res.reduce((a,w)=>a+w.sueldo,0);

  return `
  <div class="wnav">
    <button class="btn btn-outline" onclick="S.semOff--;render()">← Anterior</button>
    <span class="wrange">${fmtF(dias[0])} — ${fmtF(dias[6])}</span>
    <button class="btn btn-outline" onclick="S.semOff++;render()" ${S.semOff>=0?'disabled':''}>Siguiente →</button>
    <div style="flex:1;"></div>
    <button class="btn btn-accent" onclick="exportExcel()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>Exportar Excel
    </button>
    <button class="btn btn-gold" onclick="schedulePayment()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>Programar pago
    </button>
  </div>

  ${res.length?`<div class="kpi-row" style="margin-bottom:18px;">
    <div class="kpi"><div class="kpi-label">Trabajadores activos</div><div class="kpi-val">${res.length}</div><div class="kpi-sub">Esta semana</div></div>
    <div class="kpi"><div class="kpi-label">Días trabajados</div><div class="kpi-val">${regs.length}</div><div class="kpi-sub">De 7 posibles</div></div>
    <div class="kpi"><div class="kpi-label">Total sacos</div><div class="kpi-val">${totS}</div><div class="kpi-sub">${(totS/Math.max(regs.length,1)).toFixed(0)} promedio/día</div></div>
    <div class="kpi dark"><div class="kpi-label">Nómina total</div><div class="kpi-val">${fmtM(totP)}</div><div class="kpi-sub">A $${S.precio.toFixed(2)}/saco</div></div>
  </div>`:''}

  <div class="card">
    <div class="card-head">

        <table style="min-width:700px;">

              <th class="tr">Sacos</th><th class="tr">Sueldo</th>

          </thead>
          <tbody>
            ${res.map(w=>{ const g=getWorkerGroup(w.t.id);

                <td><div class="worker-cell"><div class="w-avatar ${avCol(w.t.nombre)}" style="width:28px;height:28px;font-size:10px;">${ini(w.t.nombre)}</div><div class="worker-info"><div class="wn" style="font-size:12.5px;">${esc(w.t.nombre)}</div>${w.t.banco?`<div class="ws">${esc(w.t.banco)}</div>`:''}</div></div></td>
                <td>${g?`<span class="group-badge ${gbClass(g.nombre)}" style="font-size:10.5px;">${g.nombre}</span>`:'<span style="color:var(--text3);">—</span>'}</td>
                <td class="mono" style="font-size:11px;color:var(--text3);">${w.t.cuenta||'—'}</td>
                ${w.sd.map(s=>`<td class="tr">${s!==null?`<span style="background:rgba(0,212,170,0.1);color:#0A5C50;padding:2px 7px;border-radius:5px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;">${s}</span>`:'<span style="color:var(--border);">—</span>'}</td>`).join('')}
                <td class="tr mono" style="font-weight:700;">${w.ts}</td>

              <td colspan="3" style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;padding:9px 14px;">Totales de la semana</td>
              ${dias.map(d=>{ const r2=regs.find(rr=>rr.fecha===d); return `<td class="tr mono" style="font-size:11.5px;font-weight:700;color:var(--text2);">${r2?r2.totalSacos:'—'}</td>`; }).join('')}

function buildPayments(){
  const sorted=[...S.pagos].sort((a,b)=>a.fechaPago.localeCompare(b.fechaPago));
  const pending=sorted.filter(p=>p.estado!=='pagado');
  const done=sorted.filter(p=>p.estado==='pagado');

  return `
  <div style="display:grid;grid-template-columns:3fr 2fr;gap:18px;margin-bottom:18px;">
    <div class="card">
      <div class="card-head"><div class="card-title">Programar nuevo pago</div></div>
      <div class="card-body">
        <div class="form-grid g2" style="margin-bottom:14px;">
          <div class="fg"><label>Concepto / descripción <span>*</span></label><input id="pp-concepto" type="text" placeholder="Ej. Nómina semana 12, Bono..."></div>
          <div class="fg"><label>Fecha de pago <span>*</span></label><input id="pp-fecha" type="date" value="${hoy()}"></div>
          <div class="fg"><label>Grupo a pagar</label><select id="pp-grupo" onchange="updPayPreview()"><option value="">Todos los trabajadores</option>${S.grupos.map(g=>`<option value="${g.id}">${g.nombre}</option>`).join('')}</select></div>
          <div class="fg"><label>Semana de referencia</label><input id="pp-semana" type="text" placeholder="Ej. Semana del 01/01 al 07/01"></div>
          <div class="fg"><label>Monto personalizado por persona</label><input id="pp-monto" type="number" min="0" step="0.01" placeholder="Dejar vacío = calculado de registros"></div>
          <div class="fg"><label>Notas internas</label><input id="pp-notas" type="text" placeholder="Ej. Incluye bono de productividad"></div>
        </div>

        <div id="pay-preview" style="margin-bottom:14px;"></div>

        <button class="btn btn-primary" onclick="addPayment()">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14c1.1 0 2-.9 2-2V7l-4-4zm-2 10h-4v4h-2v-4H5v-2h4V7h2v4h4v2z"/></svg>
          Programar pago
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">Resumen</div></div>
      <div class="card-body">
        <div class="kpi" style="margin-bottom:12px;"><div class="kpi-label">Pagos pendientes</div><div class="kpi-val" style="color:var(--gold);">${pending.length}</div></div>
        <div class="kpi" style="margin-bottom:12px;"><div class="kpi-label">Pagos realizados</div><div class="kpi-val" style="color:var(--green);">${done.length}</div></div>
        <div class="kpi"><div class="kpi-label">Total programado</div><div class="kpi-val">${fmtM(pending.reduce((a,p)=>a+(p.montoTotal||0),0))}</div></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-title">Pagos pendientes</div></div>
    <div class="card-body" style="padding-top:10px;">
      ${!pending.length?`<div class="empty" style="padding:24px 0;"><div class="empty-ico">✅</div><div class="empty-txt">No hay pagos pendientes.</div></div>`:
      pending.map(p=>{
        const st=payStatus(p);
        const trabajadoresPago=S.trabajadores.filter(t=>p.trabajadoresIds.includes(t.id));
        const g=p.grupoId?S.grupos.find(x=>x.id===p.grupoId):null;
        return `<div class="pay-row" style="padding:14px 0;">
          <div class="pr-left">
            <div style="width:10px;height:42px;border-radius:5px;background:${st.cls==='pay-overdue'?'var(--red)':st.cls==='pay-pending'?'var(--gold)':'var(--blue)'};flex-shrink:0;"></div>
            <div>
              <div style="font-size:14px;font-weight:700;">${esc(p.concepto)}</div>
              <div style="font-size:12px;color:var(--text3);margin-top:2px;">
                Vence: <strong>${fmtF(p.fechaPago)}</strong>
                ${g?` · <span class="group-badge ${gbClass(g.nombre)}" style="font-size:10px;padding:1px 7px;">${g.nombre}</span>`:''}
                ${p.semana?` · ${esc(p.semana)}`:''}
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">
                ${trabajadoresPago.slice(0,5).map(t=>`<span style="background:var(--surface);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:500;">${esc(t.nombre)}</span>`).join('')}
                ${trabajadoresPago.length>5?`<span style="background:var(--surface);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text3);">+${trabajadoresPago.length-5} más</span>`:''}
              </div>
              ${p.notas?`<div style="font-size:11.5px;color:var(--text3);margin-top:5px;font-style:italic;">${esc(p.notas)}</div>`:''}
            </div>
          </div>
          <div class="pr-right">
            <div style="text-align:right;">
              <div style="font-size:16px;font-weight:800;">${fmtM(p.montoTotal||0)}</div>
              <div style="font-size:11px;color:var(--text3);">${trabajadoresPago.length} trabajador${trabajadoresPago.length!==1?'es':''}</div>
              <span class="pay-pill ${st.cls}" style="margin-top:5px;font-size:10.5px;">${st.label}</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:5px;">
              <button class="btn btn-accent btn-xs" onclick="markPaid('${p.id}')">Marcar pagado</button>
              <button class="btn btn-danger btn-xs" onclick="delPayment('${p.id}')">Eliminar</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>

  ${done.length?`<div class="card">
    <div class="card-head"><div class="card-title">Historial de pagos realizados</div></div>
    <div class="card-body">
      <div class="table-scroll">
        <table>
          <thead><tr><th>Concepto</th><th>Fecha de pago</th><th>Grupo</th><th class="tr">Personal</th><th class="tr">Monto total</th><th class="tc">Estado</th></tr></thead>
          <tbody>
            ${done.map(p=>{
              const g=p.grupoId?S.grupos.find(x=>x.id===p.grupoId):null;
              return `<tr>
                <td style="font-weight:600;">${esc(p.concepto)}</td>
                <td class="mono">${fmtF(p.fechaPago)}</td>
                <td>${g?`<span class="group-badge ${gbClass(g.nombre)}" style="font-size:10.5px;">${g.nombre}</span>`:'—'}</td>
                <td class="tr">${p.trabajadoresIds.length}</td>
                <td class="tr mono" style="font-weight:700;color:var(--green);">${fmtM(p.montoTotal||0)}</td>
                <td class="tc"><span class="pay-pill pay-paid" style="font-size:10.5px;">Pagado</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`:''}`;
}

function addPayment(){
  const concepto=document.getElementById('pp-concepto').value.trim();
  if(!concepto){toast('El concepto es obligatorio');return;}
  const fecha=document.getElementById('pp-fecha').value;
  if(!fecha){toast('La fecha es obligatoria');return;}
  const gid=document.getElementById('pp-grupo').value;
  const montoCustom=parseFloat(document.getElementById('pp-monto').value)||null;
  let trabajadoresIds;
  if(gid){ const g=S.grupos.find(x=>x.id===gid); trabajadoresIds=(g?.trabajadoresIds||[]).slice(); }
  else trabajadoresIds=S.trabajadores.map(t=>t.id);
  if(!trabajadoresIds.length){toast('No hay trabajadores para este pago');return;}
  const montoPorPer=montoCustom||calcWeeklyPay(trabajadoresIds,gid);
  const montoTotal=montoPorPer*trabajadoresIds.length;
  S.pagos.unshift({
    id:uid(),fechaPago:fecha,concepto,
    grupoId:gid||undefined,
    trabajadoresIds,
    montoPorPersona:montoPorPer,
    montoTotal,
    semana:document.getElementById('pp-semana').value.trim(),
    notas:document.getElementById('pp-notas').value.trim(),
    estado:'pendiente'
  });
  save(); toast('Pago programado correctamente'); render();
}
function calcWeeklyPay(tids, gid){
  const dias=semana(0);
  const total=tids.reduce((a,tid)=>{
    const sueldo=S.registros.filter(r=>dias.includes(r.fecha)&&r.trabajadoresIds.includes(tid)).reduce((b,r)=>{
      return b+Math.floor(r.totalSacos/r.trabajadoresIds.length)*r.precio;
    },0);
    return a+sueldo;
  },0);
  return tids.length?total/tids.length:0;
}
function updPayPreview(){
  const gid=document.getElementById('pp-grupo')?.value||'';
  const montoC=parseFloat(document.getElementById('pp-monto')?.value)||null;
  let tids=gid?(S.grupos.find(x=>x.id===gid)?.trabajadoresIds||[]):S.trabajadores.map(t=>t.id);
  const mp=montoC||calcWeeklyPay(tids,gid);
  const el=document.getElementById('pay-preview');
  if(!el||!tids.length) return;
  el.innerHTML=`<div style="background:var(--surface);border-radius:9px;padding:12px 14px;font-size:13px;">
    <span style="color:var(--text3);">Estimado:</span> <strong>${fmtM(mp)}</strong> × ${tids.length} = <strong style="color:var(--green);">${fmtM(mp*tids.length)}</strong>
    ${!montoC?'<span style="color:var(--text3);font-size:11px;"> (calculado de registros de esta semana)</span>':''}
  </div>`;
}
function markPaid(id){
  const p=S.pagos.find(x=>x.id===id); if(!p) return;
  p.estado='pagado'; save(); toast('Pago marcado como realizado'); render();
}
function delPayment(id){ if(!confirm('¿Eliminar este pago?')) return; S.pagos=S.pagos.filter(p=>p.id!==id); save(); toast('Pago eliminado'); render(); }

function schedulePayment(){
  const dias=semana(S.semOff);
  const regs=S.registros.filter(r=>dias.includes(r.fecha));
  if(!regs.length){toast('No hay registros para esta semana');return;}
  openModal('Programar pago de la semana',`
    <div class="form-grid" style="gap:12px;">
      <div class="fg"><label>Concepto</label><input id="sp-concepto" type="text" value="Nómina ${fmtF(dias[0])} – ${fmtF(dias[6])}"></div>
      <div class="fg"><label>Fecha de pago <span>*</span></label><input id="sp-fecha" type="date" value="${hoy()}"></div>
      <div class="fg"><label>Grupo (opcional)</label><select id="sp-grupo"><option value="">Todos</option>${S.grupos.map(g=>`<option value="${g.id}">${g.nombre}</option>`).join('')}</select></div>
      <div class="fg"><label>Notas</label><input id="sp-notas" type="text" placeholder="Notas adicionales"></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="confirmSchedulePay('${dias[0]}','${dias[6]}')">Confirmar</button>`
  );
}
function confirmSchedulePay(d0,d6){
  const concepto=document.getElementById('sp-concepto').value.trim()||`Nómina ${fmtF(d0)}`;
  const fecha=document.getElementById('sp-fecha').value; if(!fecha){toast('Fecha obligatoria');return;}
  const gid=document.getElementById('sp-grupo').value;
  let tids=gid?(S.grupos.find(x=>x.id===gid)?.trabajadoresIds||[]):S.trabajadores.map(t=>t.id);
  if(!tids.length){toast('Sin trabajadores');return;}
  const mp=calcWeeklyPay(tids,gid);
  S.pagos.unshift({id:uid(),fechaPago:fecha,concepto,grupoId:gid||undefined,trabajadoresIds:tids,montoPorPersona:mp,montoTotal:mp*tids.length,semana:`${fmtF(d0)} – ${fmtF(d6)}`,notas:document.getElementById('sp-notas').value.trim(),estado:'pendiente'});
  save(); closeModal(); toast('Pago programado'); goTab('payments');
}

//  EXCEL EXPORT
// ════════════════════════════════════════════════════════
function exportExcel(){
  const dias=semana(S.semOff);
  const regs=S.registros.filter(r=>dias.includes(r.fecha));
  const ND=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  const wb=XLSX.utils.book_new();

  // SHEET 1: Detalle por trabajador
  const hdrs=['Trabajador','Grupo','Banco','N° Cuenta','Cuentahabiente','Teléfono',
    ...dias.map((d,i)=>`${ND[i]} ${fmtF(d)}`),'Total Sacos','Sueldo Total'];
  const filas=S.trabajadores.map(t=>{
    const g=getWorkerGroup(t.id);
    const sd=dias.map(dia=>{ const r=regs.find(rr=>rr.fecha===dia&&rr.trabajadoresIds.includes(t.id)); return r?Math.floor(r.totalSacos/r.trabajadoresIds.length):0; });
    const ts=sd.reduce((a,b)=>a+b,0);
    return ts>0?[t.nombre,g?g.nombre:'',t.banco||'',t.cuenta||'',t.titular||'',t.tel||'',...sd,ts,ts*S.precio]:null;
  }).filter(Boolean);
  if(filas.length){
    const ws=XLSX.utils.aoa_to_sheet([hdrs,...filas]);
    ws['!cols']=[{wch:24},{wch:12},{wch:16},{wch:20},{wch:24},{wch:14},...dias.map(()=>({wch:14})),{wch:12},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws,'Detalle Trabajadores');
  }

  // SHEET 2: Por grupo
  if(S.grupos.length){
    const gdHdrs=['Grupo','Trabajadores','Total Sacos Semana','Promedio Diario','Monto Total'];
    const gdFil=S.grupos.map(g=>{
      const mems=(g.trabajadoresIds||[]).length;
      const total=S.trabajadores.filter(t=>(g.trabajadoresIds||[]).includes(t.id)).reduce((a,t)=>{
        return a+dias.reduce((b,d)=>{ const r=regs.find(rr=>rr.fecha===d&&rr.trabajadoresIds.includes(t.id)); return b+(r?Math.floor(r.totalSacos/r.trabajadoresIds.length):0); },0);
      },0);
      return [g.nombre,mems,total,(total/7).toFixed(1),total*S.precio];
    });
    const ws2=XLSX.utils.aoa_to_sheet([gdHdrs,...gdFil]);
    ws2['!cols']=[{wch:16},{wch:14},{wch:18},{wch:16},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws2,'Resumen por Grupos');
  }

  // SHEET 3: Pagos
  if(S.pagos.length){
    const phHdrs=['Concepto','Grupo','Fecha de Pago','Semana de Referencia','Trabajadores','Monto/Persona','Total','Estado','Notas'];
    const phFil=S.pagos.map(p=>{
      const g=p.grupoId?S.grupos.find(x=>x.id===p.grupoId):null;
      return [p.concepto,g?g.nombre:'Todos',fmtF(p.fechaPago),p.semana||'',p.trabajadoresIds.length,p.montoPorPersona||0,p.montoTotal||0,p.estado,p.notas||''];
    });
    const ws3=XLSX.utils.aoa_to_sheet([phHdrs,...phFil]);
    ws3['!cols']=[{wch:28},{wch:12},{wch:14},{wch:22},{wch:14},{wch:15},{wch:15},{wch:13},{wch:28}];
    XLSX.utils.book_append_sheet(wb,ws3,'Pagos Programados');
  }

  if(!wb.SheetNames.length){toast('No hay datos para exportar');return;}
  XLSX.writeFile(wb,`nomina_${dias[0]}_${dias[6]}.xlsx`);
  toast('Excel generado con éxito');
}
